  <g transform="translate(40, 40) scale(3.33)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </g>
  <!-- "CitadelDS" white text for dark backgrounds -->
  <text x="168" y="105" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5">
    <tspan fill="#ffffff">Citadel</tspan><tspan fill="#60a5fa">DS</tspan>
  </text>
</svg>
